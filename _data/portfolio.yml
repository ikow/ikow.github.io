exploitDev:
- title: Copy Fail — Live Code Corruption via Page Cache
  target: Linux kernel — targets CVE-2026-31431 (bug discovered by Theori)
  platform: Linux Kernel
  sevLabel: Exploit Dev
  sevClass: default
  oneLiner: 'My novel exploitation technique for the Copy Fail kernel bug: instead of corrupting data
    files, write shellcode into libc''s exit() through the shared page cache so every exiting process
    runs it — one-shot root, no disk modification.'
  repo: https://github.com/ikow/CVE-2026-31431-live-code-corruption
  link: https://www.ikow.cn/cve-2026-31431-live-code-corruption/
  linkLabel: writeup
- title: Dirty Frag / Fragnesia — Page-Cache Write LPE Analysis
  target: Linux kernel — analysis of CVE-2026-46300 (disclosed by W. Bowling)
  platform: Linux Kernel
  sevLabel: Analysis
  sevClass: default
  oneLiner: Analysis and verified exploitation of the Fragnesia / Dirty-Frag page-cache-write LPE class,
    including a portable live-code-corruption variant that applies the Copy Fail technique to the ESP/RxRPC
    sinks.
  repo: https://github.com/ikow/dirty-frag-analysis
  link: ''
  linkLabel: ''
- title: Smashing The Browser — From Discovery to Exploit
  target: Google Chrome & Internet Explorer 11
  platform: Browser
  sevLabel: 0-day
  sevClass: default
  oneLiner: 'A three-part series: a custom browser fuzzing framework (StateFuzzer), advanced Chrome/IE11
    heap-exploitation techniques, and full IE11 use-after-free 0-day exploit development.'
  repo: https://github.com/ikow/Smashing_The_Browser
  link: ''
  linkLabel: ''
